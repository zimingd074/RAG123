server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://localhost:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1024
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  embedding:
    model-id: qwen-emb-06b
    timeout-ms: 5000

  rerank:
    enabled: true
    candidate-limit: 15
    document-max-chars: 3000
    timeout-ms: 2500
    fallback-to-rrf: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: 10
      max-wait-seconds: 15
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2
      keyword-pg:
        enabled: true
        top-k-multiplier: 2
        ordinary-fts-conditional: true
    fusion:
      rrf:
        enabled: true
        k: 20
        vector-weight: 1.0
        keyword-weight: 0.7
        exact-identifier-weight: 1.0

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /v1/chat/completions
        embedding: /api/embed
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    aihubmix:
      url: https://aihubmix.com
      api-key: ${AIHUBMIX_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen3-max
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: qwen3.7-max
        provider: bailian
        model: qwen3.7-max
        priority: 4
      - id: qwen3.7-plus
        provider: bailian
        model: qwen3.7-plus
        priority: 5
      - id: qwen3.6-flash
        provider: bailian
        model: qwen3.6-flash
        priority: 6
      - id: deepseek-v4-pro
        provider: bailian
        model: deepseek-v4-pro
        priority: 7
      - id: deepseek-v4-flash
        provider: bailian
        model: deepseek-v4-flash
        priority: 8
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 9
      - id: gpt-5.4
        provider: aihubmix
        model: gpt-5.4
        priority: 10

  embedding:
    default-model: qwen-emb-06b
    candidates:
      - id: qwen-emb-06b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-0.6B
        dimension: ${rag.default.dimension}
        send-dimensions: true
        query-prefix: "Instruct: Given a user question, retrieve relevant passages from a Chinese e-commerce knowledge base that answer the question.\nQuery: "
        priority: 1
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        send-dimensions: true
        query-prefix: "Instruct: Given a user question, retrieve relevant passages from a Chinese e-commerce knowledge base that answer the question.\nQuery: "
        priority: 10
      - id: qwen-emb-4b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-4B
        dimension: ${rag.default.dimension}
        send-dimensions: true
        query-prefix: "Instruct: Given a user question, retrieve relevant passages from a Chinese e-commerce knowledge base that answer the question.\nQuery: "
        enabled: ${QWEN_EMBEDDING_4B_ENABLED:false}
        priority: 11
      - id: bge-m3
        provider: siliconflow
        model: BAAI/bge-m3
        dimension: 1024
        send-dimensions: false
        enabled: ${BGE_M3_ENABLED:false}
        priority: 12
      - id: bge-large-zh
        provider: siliconflow
        model: BAAI/bge-large-zh-v1.5
        dimension: 1024
        send-dimensions: false
        query-prefix: "为这个句子生成表示以用于检索相关文章："
        enabled: ${BGE_LARGE_ZH_ENABLED:false}
        priority: 13
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        send-dimensions: false
        query-prefix: "Instruct: Given a user question, retrieve relevant passages from a Chinese e-commerce knowledge base that answer the question.\nQuery: "
        priority: 2
      - id: text-embedding-3-large
        provider: aihubmix
        model: text-embedding-3-large
        dimension: ${rag.default.dimension}
        priority: 3

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false
  eval:
    enabled: ${RAGENT_EVAL_ENABLED:false}
